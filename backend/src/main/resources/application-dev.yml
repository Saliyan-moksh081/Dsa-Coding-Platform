spring:
  # Use H2 for development
  datasource:
    url: jdbc:h2:mem:dsaplatform;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    baseline-on-migrate: true

  # Email Configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    test-connection: false
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  flyway:
    enabled: true

# Admin email for development
admin:
  email: mokshith.saliyan081@gmail.com

# Disable Docker for development (use process-based execution)
judge:
  docker:
    enabled: false
